# Nginx interno da imagem do frontend: serve o SPA e encaminha /api ao backend.
# Este NÃO é o reverse-proxy da stack — a terminação TLS e o roteamento externo
# são feitos pelo NGINX Proxy Manager (NPM). O NPM aponta para este container.
worker_processes auto;
# imagem nginx-unprivileged roda como não-root: PID e temporários em /tmp
pid /tmp/nginx.pid;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # cabeçalhos de segurança (complementam os do NPM)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # API -> backend
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  }
}
