# ==================================================
# AD-Audit-Portal — stack de desenvolvimento/base
# Reverse-proxy/TLS externos (NGINX Proxy Manager). Aponte o NPM para o
# serviço 'frontend' (porta publicada abaixo). Ver docs/npm.md.
# ==================================================
name: ad-audit-portal

x-common-env: &common-env
  env_file: .env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # Executa migrations do Alembic e encerra (dependência dos demais serviços).
  migrate:
    build: ./backend
    <<: *common-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [internal]

  backend:
    build: ./backend
    restart: unless-stopped
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    secrets: [ad_ca_certificate]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [internal]

  collector:
    build: ./collector
    restart: unless-stopped
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - wefspool:/data/wef-spool
    networks: [internal]

  worker:
    build: ./worker
    restart: unless-stopped
    <<: *common-env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  beat:
    build: ./worker
    restart: unless-stopped
    <<: *common-env
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=INFO", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      redis:
        condition: service_healthy
    networks: [internal]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Porta publicada para o NGINX Proxy Manager rotear (host:container).
    ports:
      - "${FRONTEND_PUBLISH_PORT:-8088}:8080"
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  wefspool:

networks:
  internal:
    driver: bridge

# Segredos (Docker Secrets). Em Swarm/K8s substitua por secrets nativos.
secrets:
  ad_ca_certificate:
    file: ./secrets/ad_ca_certificate.pem
