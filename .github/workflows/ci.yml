name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r tests/requirements.txt
      - name: Rodar testes (unit + integração + segurança)
        env:
          APP_SECRET_KEY: ci-secret-key-0123456789abcdef0123
          JWT_SECRET_KEY: ci-jwt-key-abcdef0123456789abcdef01
          DATABASE_URL: postgresql+psycopg://u:p@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          AD_ENABLED: "false"
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend collector worker || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: frontend
        run: |
          npm install
          npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy — scan de dependências e IaC (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # não bloqueia build; ajuste para "1" para reforçar
          format: table

  image-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v7
      - name: Build imagem backend
        run: docker build -t adaudit-backend:ci ./backend
      - name: Trivy — scan da imagem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: adaudit-backend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
