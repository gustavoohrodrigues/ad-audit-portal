# Exemplo de configuração do Prometheus para o AD Audit Portal.
# Aponte para o backend em /api/v1/metrics.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: ad-audit-backend
    metrics_path: /api/v1/metrics
    scheme: http
    static_configs:
      - targets: ["backend:8000"]
        labels:
          app: ad-audit-portal

